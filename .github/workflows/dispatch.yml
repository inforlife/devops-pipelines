name: Send repository dispatch event

on:
  issue_comment:
    types: [created]

# Comma-separated list of repositories allowed to receive dispatch events
# Format: "repo1,repo2,repo3" (lowercase, alphanumeric and hyphens only)
env:
  ALLOWED_REPOS: "new-app,test-repo,demo-project"

jobs:
  dispatch-event:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event
        run: |
          # Set the required variables
          target_repo=$(printf '%s\n' "${{ github.event.issue.title }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          event_type=$(printf '%s\n' "${{ github.event.comment.body }}" | cut -d " " -f 1 | tr '[:upper:]' '[:lower:]')
          
          # Validate target_repo format (only alphanumeric and hyphens)
          if [[ ! "$target_repo" =~ ^[a-z0-9-]+$ ]]; then
            echo "Error: Target repository name '$target_repo' contains invalid characters."
            echo "Only lowercase letters, numbers, and hyphens are allowed."
            exit 1
          fi
          
          # Validate target repository against whitelist
          IFS=',' read -ra allowed_repos <<< "$ALLOWED_REPOS"
          repo_allowed=false
          for repo in "${allowed_repos[@]}"; do
            # Trim leading and trailing whitespace using parameter expansion
            # ${var%%[![:space:]]*} finds leading spaces, ${var##*[![:space:]]} finds trailing spaces
            repo="${repo#"${repo%%[![:space:]]*}"}"
            repo="${repo%"${repo##*[![:space:]]}"}"
            if [[ "$repo" == "$target_repo" ]]; then
              repo_allowed=true
              break
            fi
          done
          
          if [[ "$repo_allowed" == "false" ]]; then
            echo "Error: Target repository '$target_repo' is not in the allowed list."
            echo "Allowed repositories: $ALLOWED_REPOS"
            exit 1
          fi
          
          # Parse all remaining parameters as comma-separated key-value pairs
          params=$(printf '%s\n' "${{ github.event.comment.body }}" | cut -d " " -f 2-)
          
          # Build the client_payload JSON from comma-separated key-value pairs
          payload_json='{'
          IFS=',' read -ra PARAM_PAIRS <<< "$params"
          first=true
          for pair in "${PARAM_PAIRS[@]}"; do
            # Trim whitespace
            pair=$(echo "$pair" | xargs)
            # Split on first space to get key and value
            key=$(echo "$pair" | cut -d " " -f 1)
            value=$(echo "$pair" | cut -d " " -f 2-)
            
            if [ ! -z "$key" ] && [ ! -z "$value" ]; then
              if [ "$first" = false ]; then
                payload_json+=','
              fi
              payload_json+="\"$key\":\"$value\""
              first=false
              echo "  $key: $value"
            fi
          done
          payload_json+='}'
          
          # Create a complete request body with event_type and client_payload
          request_body="{\"event_type\":\"$event_type\",\"client_payload\":$payload_json}"
          echo "Request body: $request_body"
          
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository_owner }}/$target_repo/dispatches \
            --input - <<< "$request_body"
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}



