name: Send repository dispatch event

on:
  issue_comment:
    types: [created]

jobs:
  dispatch-event:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event
        run: |
          # Set the required variables
          target_repo=$(printf '%s\n' "${{ github.event.issue.title }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          event_type=$(printf '%s\n' "${{ github.event.comment.body }}" | cut -d " " -f 1 | tr '[:upper:]' '[:lower:]')
          
          # Parse all remaining parameters as comma-separated key-value pairs
          params=$(printf '%s\n' "${{ github.event.comment.body }}" | cut -d " " -f 2-)
          
          # Build the client_payload JSON from comma-separated key-value pairs
          IFS=',' read -ra PARAM_PAIRS <<< "$params"
          payload_pairs=$(
            for pair in "${PARAM_PAIRS[@]}"; do
              # Trim leading/trailing whitespace
              pair=$(echo "$pair" | xargs)
              # Split on first space to get key and value
              key=$(echo "$pair" | cut -d " " -f 1)
              value=$(echo "$pair" | cut -d " " -f 2-)
              # Emit tab-separated key<TAB>value; skip if key or value is empty
              if [ -n "$key" ] && [ -n "$value" ] && [ "$key" != "$value" ]; then
                printf '%s\t%s\n' "$key" "$value"
              fi
            done
          )
          
          # Use jq to safely construct the client_payload JSON object
          payload_json=$(printf '%s\n' "$payload_pairs" | jq -Rn '
            [ inputs
              | select(length > 0)              # skip empty lines
              | split("\t")                     # split on tab separator
              | select(length == 2 and .[0] != "" and .[1] != "")  # skip malformed
              | {key: .[0], value: .[1]}
            ] | from_entries
          ')
          
          # Create a complete request body with event_type and client_payload using jq
          request_body=$(jq -n \
            --arg event_type "$event_type" \
            --argjson client_payload "$payload_json" \
            '{event_type: $event_type, client_payload: $client_payload}')
          echo "Request body: $request_body"
          
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository_owner }}/$target_repo/dispatches \
            --input - <<< "$request_body"
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
