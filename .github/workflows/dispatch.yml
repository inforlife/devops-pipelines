name: Send repository dispatch event

on:
  issue_comment:
    types: [created]

jobs:
  dispatch-event:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event
        run: |
          # Set the required variables
          target_repo=$(echo ${{ github.event.issue.title }} | cut -d "@" -f 1 | xargs | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          target_release=$(echo ${{ github.event.issue.title }} | cut -d "@" -f 2)
          event_type=${{ github.event.comment.body }}

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository_owner }}/$target_repo/dispatches \
            -f "event_type=$event_type" -F "client_payload[target_release]=$target_release"
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
