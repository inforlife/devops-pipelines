name: Send repository dispatch event

on:
  issue_comment:
    types: [created]

jobs:
  dispatch-event:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event
        run: |
          # Set the required variables
          target_repo=$(echo ${{ github.event.issue.title }} | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          event_type=$(echo ${{ github.event.comment.body }} | cut -d " " -f 1 | tr '[:upper:]' '[:lower:]')
          
          # Parse all remaining parameters as comma-separated key-value pairs
          params=$(echo ${{ github.event.comment.body }} | cut -d " " -f 2-)
          
          # Build the client_payload JSON from comma-separated key-value pairs
          payload_json='{'
          IFS=',' read -ra PARAM_PAIRS <<< "$params"
          first=true
          for pair in "${PARAM_PAIRS[@]}"; do
            # Trim whitespace
            pair=$(echo "$pair" | xargs)
            # Split on first space to get key and value
            key=$(echo "$pair" | cut -d " " -f 1)
            value=$(echo "$pair" | cut -d " " -f 2-)
            
            if [ ! -z "$key" ] && [ ! -z "$value" ]; then
              if [ "$first" = false ]; then
                payload_json+=','
              fi
              payload_json+="\"$key\":\"$value\""
              first=false
              echo "  $key: $value"
            fi
          done
          payload_json+='}'
          
          # Create a complete request body with event_type and client_payload
          request_body="{\"event_type\":\"$event_type\",\"client_payload\":$payload_json}"
          echo "Request body: $request_body"
          
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository_owner }}/$target_repo/dispatches \
            --input - <<< "$request_body"
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}



